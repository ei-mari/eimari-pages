<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOUND DESIGN LAB | Lesson 4 Model 3</title>
    <meta
      name="description"
      content="SOUND DESIGN LAB Lesson 4で使う3つ目のモデル音声ページです。Dark Lを含むフレーズごとに音声とIPAを確認できます。"
    />
    <meta property="og:image" content="assets/lesson4-model3-hero.png" />
    <meta name="twitter:image" content="assets/lesson4-model3-hero.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f1eadf;
        --ink: #171412;
        --muted: #74695f;
        --accent: #d8442f;
        --navy: #0b2138;
        --gold: #b9892a;
        --teal: #247872;
        --panel: rgba(255, 253, 248, 0.88);
        --shadow: 0 22px 58px rgba(39, 31, 23, 0.14);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        background:
          linear-gradient(90deg, rgba(43, 36, 30, 0.045) 1px, transparent 1px),
          linear-gradient(180deg, rgba(43, 36, 30, 0.045) 1px, transparent 1px),
          linear-gradient(180deg, #fffaf2 0%, var(--bg) 56%, #e9dfd3 100%);
        background-size: 34px 34px, 34px 34px, auto;
        color: var(--ink);
        font-family: "Zen Kaku Gothic New", sans-serif;
      }

      .page {
        width: min(100%, 430px);
        margin: 0 auto;
        padding: 10px 9px 30px;
      }

      .hero {
        overflow: hidden;
        border: 1px solid rgba(43, 36, 30, 0.18);
        border-radius: var(--radius);
        background: #fff;
        box-shadow: var(--shadow);
      }

      .hero img {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }

      .board {
        margin-top: 18px;
        padding: 10px;
        border: 1px solid rgba(43, 36, 30, 0.16);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: 0 16px 44px rgba(39, 31, 23, 0.09);
      }

      p {
        margin: 0;
      }

      .phrase-list {
        display: grid;
        gap: 14px;
      }

      .phrase-card {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(43, 36, 30, 0.15);
        border-radius: var(--radius);
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(250, 244, 235, 0.9)),
          #fff;
        box-shadow: 0 8px 26px rgba(39, 31, 23, 0.07);
      }

      .phrase-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: 6px;
        background: var(--card-accent, var(--accent));
      }

      .phrase-main {
        display: grid;
        gap: 12px;
        padding: 16px 14px;
      }

      .number {
        display: inline-grid;
        place-items: center;
        width: 42px;
        height: 30px;
        border: 1px solid rgba(43, 36, 30, 0.16);
        border-radius: 999px;
        background: rgba(255, 253, 248, 0.9);
        color: var(--muted);
        font-family: "Inter", sans-serif;
        font-size: 0.74rem;
        font-weight: 900;
      }

      .phrase {
        font-family: "Inter", "Zen Kaku Gothic New", sans-serif;
        font-size: 1.5rem;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.18;
      }

      .ipa {
        color: #314b5a;
        font-family: "Inter", "Zen Kaku Gothic New", sans-serif;
        font-size: 1.02rem;
        font-weight: 900;
        line-height: 1.45;
      }

      .audio-box {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid rgba(43, 36, 30, 0.12);
        border-left: 4px solid var(--card-accent, var(--teal));
        border-radius: var(--radius);
        background: rgba(255, 253, 248, 0.82);
      }

      .audio-label {
        color: var(--ink);
        font-family: "Inter", "Zen Kaku Gothic New", sans-serif;
        font-size: 0.82rem;
        font-weight: 900;
        line-height: 1.35;
      }

      audio {
        width: 100%;
        height: 40px;
      }

      .speed-control {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }

      .speed-button {
        min-height: 32px;
        border: 1px solid rgba(49, 75, 90, 0.18);
        border-radius: 999px;
        background: #fff;
        color: #314b5a;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 0.74rem;
        font-weight: 900;
      }

      .speed-button.is-active {
        border-color: rgba(216, 68, 47, 0.35);
        background: var(--accent);
        color: #fff;
        box-shadow: 0 6px 14px rgba(216, 68, 47, 0.16);
      }

      .accent-red {
        --card-accent: var(--accent);
      }

      .accent-teal {
        --card-accent: var(--teal);
      }

      .accent-gold {
        --card-accent: var(--gold);
      }

      .accent-navy {
        --card-accent: var(--navy);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-labelledby="page-title">
        <img src="assets/lesson4-model3-hero.png" alt="" />
        <h1 class="sr-only" id="page-title">Lesson 4 Model 3</h1>
      </section>

      <section class="board" aria-label="Lesson 4 Model 3">
        <div class="phrase-list">
          <article class="phrase-card accent-red">
            <div class="phrase-main">
              <span class="number">#1</span>
              <p class="phrase">that’s final</p>
              <p class="ipa">/ðæts ˈfaɪnəl/</p>
              <div class="audio-box">
                <p class="audio-label">model</p>
                <audio controls preload="metadata" src="assets/audio/01-thats-final.wav"></audio>
              </div>
            </div>
          </article>

          <article class="phrase-card accent-teal">
            <div class="phrase-main">
              <span class="number">#2</span>
              <p class="phrase">crystal clear</p>
              <p class="ipa">/ˈkrɪstəl klɪr/</p>
              <div class="audio-box">
                <p class="audio-label">model</p>
                <audio controls preload="metadata" src="assets/audio/02-crystal-clear.wav"></audio>
              </div>
            </div>
          </article>

          <article class="phrase-card accent-gold">
            <div class="phrase-main">
              <span class="number">#3</span>
              <p class="phrase">olive oil</p>
              <p class="ipa">/ˈɑlɪv ɔɪ(j)l/</p>
              <p class="ipa">*(j) - わたり音のY</p>
              <div class="audio-box">
                <p class="audio-label">model</p>
                <audio controls preload="metadata" src="assets/audio/03-olive-oil.wav"></audio>
              </div>
            </div>
          </article>

          <article class="phrase-card accent-navy">
            <div class="phrase-main">
              <span class="number">#4</span>
              <p class="phrase">beautiful smile</p>
              <p class="ipa">/ˈbjutəfəl smaɪ(j)l/</p>
              <p class="ipa">*(j) - わたり音のY</p>
              <div class="audio-box">
                <p class="audio-label">model</p>
                <audio controls preload="metadata" src="assets/audio/04-beautiful-smile.wav"></audio>
              </div>
            </div>
          </article>

          <article class="phrase-card accent-red">
            <div class="phrase-main">
              <span class="number">#5</span>
              <p class="phrase">graduated in April</p>
              <p class="ipa">/ˈɡrædʒuˌeɪtɪd ɪn ˈeɪprəl/</p>
              <div class="audio-box">
                <p class="audio-label">model</p>
                <audio controls preload="metadata" src="assets/audio/05-graduated-in-april.wav"></audio>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>
    <script>
      document.querySelectorAll(".audio-box").forEach((box, index) => {
        const audio = box.querySelector("audio");
        const speeds = ["0.25", "0.5", "0.75", "1"];
        const storageKey = `lesson4Model3AudioSpeed-${index}`;
        const savedSpeed = localStorage.getItem(storageKey) || "1";
        const speedControl = document.createElement("div");

        speedControl.className = "speed-control";
        speedControl.setAttribute("aria-label", "再生速度");

        speeds.forEach((speed) => {
          const button = document.createElement("button");
          button.className = "speed-button";
          button.type = "button";
          button.dataset.speed = speed;
          button.textContent = speed === "1" ? "1.0" : speed;
          button.addEventListener("click", () => setPlaybackSpeed(speed));
          speedControl.appendChild(button);
        });

        audio.insertAdjacentElement("afterend", speedControl);

        function setPlaybackSpeed(speed) {
          audio.playbackRate = Number(speed);
          localStorage.setItem(storageKey, speed);

          speedControl.querySelectorAll(".speed-button").forEach((button) => {
            const isActive = button.dataset.speed === speed;
            button.classList.toggle("is-active", isActive);
            button.setAttribute("aria-pressed", String(isActive));
          });
        }

        audio.addEventListener("loadedmetadata", () => {
          audio.playbackRate = Number(localStorage.getItem(storageKey) || savedSpeed);
        });

        setPlaybackSpeed(savedSpeed);
      });
    </script>
  </body>
</html>
